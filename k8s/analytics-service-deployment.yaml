apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: swiftpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: swiftpay/analytics-service:1.0.0
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: swiftpay-config
          env:
            - name: DB_NAME
              value: swiftpay_analytics
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: swiftpay
spec:
  selector:
    app: analytics-service
  ports:
    - port: 80
      targetPort: 8083
