server:
  port: 8082

spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:swiftpay}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

swiftpay:
  kafka:
    consumer:
      concurrency: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.swiftpay: DEBUG
